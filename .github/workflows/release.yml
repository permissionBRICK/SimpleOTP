name: release

# Build and auto-release on every push to master. The version is MAJOR.MINOR (from version.json) plus
# an auto-incrementing PATCH computed from the existing tags, so bumping major/minor in version.json
# resets patch to 0. Creating the tag/release with the default GITHUB_TOKEN does not re-trigger this
# workflow, and a tag push never matches the branches filter — so there is no release loop.
on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- 1. Compute the version once, share it with every build job ----
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so "git tag -l" works
      - id: calc
        run: |
          set -euo pipefail
          MAJOR=$(jq -r '.major' version.json)
          MINOR=$(jq -r '.minor' version.json)
          git fetch --tags --force --quiet || true
          # PATCH = number of existing v<major>.<minor>.* tags -> resets to 0 when major/minor change.
          PATCH=$(git tag -l "v${MAJOR}.${MINOR}.*" | wc -l | tr -d ' ')
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"
          # Re-run safety: if the computed tag already exists, bump past it.
          while git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; do
            PATCH=$((PATCH + 1)); VERSION="${MAJOR}.${MINOR}.${PATCH}"; TAG="v${VERSION}"
          done
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${TAG}"

  # ---- 2. Test gate (master only; PRs/branches use ci.yml) ----
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test -c Release --nologo

  # ---- 3. Windows: Inno Setup installer (framework-dependent) + self-contained portable zip ----
  windows:
    needs: [version, test]
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (framework-dependent)
        run: >
          dotnet publish src/SimpleOtp.App -c Release -r ${{ matrix.rid }} --no-self-contained
          -p:Version=${{ needs.version.outputs.version }} -p:PublishReadyToRun=true -o publish/fdd

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # Inno resolves a relative Source against the .iss directory (installer\), so pass an absolute
          # SourceDir pointing at the publish output at the repo root.
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\SimpleOTP.iss `
            /DMyAppVersion=${{ needs.version.outputs.version }} `
            /DMyAppArch=${{ matrix.rid }} `
            "/DSourceDir=${{ github.workspace }}\publish\fdd" `
            /Odist

      - name: Publish (self-contained, for the portable zip)
        run: >
          dotnet publish src/SimpleOtp.App -c Release -r ${{ matrix.rid }} --self-contained
          -p:Version=${{ needs.version.outputs.version }} -p:PublishReadyToRun=true -o publish/portable

      - name: Package portable zip
        run: |
          Copy-Item packaging/windows/install-portable.json publish/portable/simpleotp.install.json
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path publish/portable/* -DestinationPath "dist/SimpleOTP-${{ needs.version.outputs.version }}-${{ matrix.rid }}-portable.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  # ---- 4. Linux: tar.gz (+ install scripts) and nfpm .deb / .rpm (framework-dependent) ----
  linux:
    needs: [version, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [linux-x64, linux-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (framework-dependent)
        run: >
          dotnet publish src/SimpleOtp.App -c Release -r ${{ matrix.rid }} --no-self-contained
          -p:Version=${{ needs.version.outputs.version }} -p:PublishReadyToRun=true -o publish

      - name: Install nfpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.47.0/nfpm_2.47.0_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build .deb and .rpm
        env:
          VERSION: ${{ needs.version.outputs.version }}
          ARCH: ${{ matrix.rid == 'linux-arm64' && 'arm64' || 'amd64' }}
        run: |
          mkdir -p dist
          nfpm package -f packaging/linux/nfpm.yaml -p deb -t dist/
          nfpm package -f packaging/linux/nfpm.yaml -p rpm -t dist/

      - name: Build tar.gz
        run: |
          stage="$(mktemp -d)"
          mkdir -p "$stage/SimpleOTP/app"
          cp -a publish/. "$stage/SimpleOTP/app/"
          cp packaging/linux/install.sh packaging/linux/uninstall.sh "$stage/SimpleOTP/"
          cp src/SimpleOtp.App/Assets/simpleotp.png "$stage/SimpleOTP/"
          chmod +x "$stage/SimpleOTP/install.sh" "$stage/SimpleOTP/uninstall.sh"
          mkdir -p dist
          tar -czf "dist/SimpleOTP-${{ needs.version.outputs.version }}-${{ matrix.rid }}.tar.gz" -C "$stage" SimpleOTP

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  # ---- 5. Collect every artifact and publish the GitHub release ----
  release:
    needs: [version, windows, linux]
    runs-on: ubuntu-latest
    # Mapped here so steps can gate on whether the optional VirusTotal key is configured.
    env:
      VT_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so the changelog can diff against the last release
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: pkg-*
          merge-multiple: true
      - run: ls -R dist

      # Compose the release body: a readable Downloads block (links built from the actual artifact
      # filenames in dist/) followed by the commit log since the last successful release tag.
      - name: Build release notes
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          BASE="https://github.com/$REPO/releases/download/$TAG"
          # Emit "[label](download-url)" for the first dist/ file matching a glob, else just the label.
          link() {
            local label="$1" glob="$2" f
            f=$(find dist -maxdepth 1 -type f -name "$glob" -printf '%f\n' 2>/dev/null | head -n1)
            if [ -n "$f" ]; then printf '[%s](%s/%s)' "$label" "$BASE" "$f"; else printf '%s' "$label"; fi
          }
          {
            echo "## Downloads"
            echo ""
            printf -- '- **Installer:** Windows %s / %s\n' \
              "$(link x64 'SimpleOTP-Setup-*-win-x64.exe')" "$(link ARM 'SimpleOTP-Setup-*-win-arm64.exe')"
            printf -- '- **Portable:** Windows %s / %s\n' \
              "$(link x64 'SimpleOTP-*-win-x64-portable.zip')" "$(link ARM 'SimpleOTP-*-win-arm64-portable.zip')"
            printf -- '- **Linux:** Deb %s / %s &middot; RPM %s / %s &middot; tar %s / %s\n' \
              "$(link x64 'simpleotp_*_amd64.deb')"  "$(link ARM 'simpleotp_*_arm64.deb')" \
              "$(link x64 'simpleotp-*.x86_64.rpm')" "$(link ARM 'simpleotp-*.aarch64.rpm')" \
              "$(link x64 'SimpleOTP-*-linux-x64.tar.gz')" "$(link ARM 'SimpleOTP-*-linux-arm64.tar.gz')"
            echo ""
            PREV=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)
            if [ -n "$PREV" ]; then echo "## Changes since $PREV"; else echo "## Changes"; fi
            echo ""
            git log --no-merges --pretty=format:'- %s (%h)' "${PREV:+$PREV..}HEAD"
            echo ""
          } > release-notes.md
          cat release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm

      # Optional: submit the Windows installers + portable zips to VirusTotal so there's a public scan
      # report to link from the release (and early warning of any false positives). Runs only when the
      # VIRUSTOTAL_API_KEY secret is set, and never fails the release (the release is already published).
      # Note: this does NOT remove AV false positives — code signing + per-vendor FP reports do that.
      - name: Scan installers and portable zips on VirusTotal
        id: vt
        if: env.VT_KEY != ''
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ env.VT_KEY }}
          request_rate: 4   # required for the free public API key
          files: |
            dist/*.exe
            dist/*.zip

      - name: Append VirusTotal links to the release notes
        if: env.VT_KEY != '' && steps.vt.outputs.analysis != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}   # this job has no checkout, so gh needs the repo explicitly
          TAG: ${{ needs.version.outputs.tag }}
          ANALYSIS: ${{ steps.vt.outputs.analysis }}
        run: |
          set -euo pipefail
          current=$(gh release view "$TAG" --json body -q .body)
          bt='`'  # markdown code-span backtick, via a var so it isn't read as a shell expansion
          {
            printf '%s\n\n### VirusTotal scans\n' "$current"
            # ANALYSIS is "file=url,file=url,..." — one bullet per file.
            echo "$ANALYSIS" | tr ',' '\n' | while IFS='=' read -r name url; do
              [ -n "$url" ] && printf -- '- [%s%s%s](%s)\n' "$bt" "$(basename "$name")" "$bt" "$url"
            done
          } | gh release edit "$TAG" --notes-file -
