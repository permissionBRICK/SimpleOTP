# nfpm config for SimpleOTP .deb / .rpm packages (framework-dependent .NET 10 Avalonia app).
#
# Build (run from the repo root). nfpm only expands env vars in its metadata fields (arch/version/…),
# NOT in contents.src, so the publish output must be placed at the fixed ./publish path below:
#   dotnet publish src/SimpleOtp.App -c Release -r linux-x64 --no-self-contained \
#       -p:Version=1.0.3 -p:PublishReadyToRun=true -o publish
#   ARCH=amd64 VERSION=1.0.3 nfpm package -f packaging/linux/nfpm.yaml -p deb -t dist/
#   ARCH=amd64 VERSION=1.0.3 nfpm package -f packaging/linux/nfpm.yaml -p rpm -t dist/
#   # then rm -rf publish, re-publish for linux-arm64, and run with ARCH=arm64.
# nfpm maps arch per format automatically: deb amd64/arm64, rpm x86_64/aarch64.

name: simpleotp
arch: ${ARCH}
platform: linux
version: ${VERSION}
version_schema: semver
release: 1
section: utils
priority: optional
maintainer: permissionBRICK <christoph.ambrosch@evolit.com>
vendor: permissionBRICK
homepage: https://github.com/permissionBRICK/SimpleOTP
license: MIT
description: |
  SimpleOTP - a TPM-backed TOTP authenticator desktop app.
  Generates time-based one-time passwords with hardware-bound secret storage,
  so a copied vault is useless on another machine.

# The app is framework-dependent and needs the .NET 10 base runtime (Microsoft.NETCore.App; Avalonia
# does not use the Desktop or ASP.NET Core runtime). This is a SOFT dependency: the package string is
# the same across Debian/Ubuntu/Fedora/RHEL, but the providing repo may not be enabled (and the MS feed
# never served arm64), so a hard Depends/Requires could make the package uninstallable. The postinstall
# script verifies the runtime and prints a distro-appropriate install hint instead of failing.
recommends:
  - dotnet-runtime-10.0

contents:
  # The framework-dependent publish output (binary, dlls, runtimes/, …) under /opt/simpleotp.
  # type: tree creates and owns /opt/simpleotp, so it is cleaned up on uninstall. The source is the
  # fixed ./publish path (nfpm does not expand env vars in contents.src — see the header comment).
  - src: ./publish/
    dst: /opt/simpleotp
    type: tree

  # Launcher on PATH (for type: symlink, src is the link target, dst is the link — both installed paths).
  - src: /opt/simpleotp/SimpleOtp
    dst: /usr/bin/simpleotp
    type: symlink

  - src: ./packaging/linux/simpleotp.desktop
    dst: /usr/share/applications/simpleotp.desktop
    file_info:
      mode: 0644

  - src: ./src/SimpleOtp.App/Assets/simpleotp.png
    dst: /usr/share/icons/hicolor/512x512/apps/simpleotp.png
    file_info:
      mode: 0644

  # Per-format install marker so the in-app updater knows which package to fetch and how to apply it.
  - src: ./packaging/linux/markers/install-deb.json
    dst: /opt/simpleotp/simpleotp.install.json
    packager: deb
  - src: ./packaging/linux/markers/install-rpm.json
    dst: /opt/simpleotp/simpleotp.install.json
    packager: rpm

scripts:
  postinstall: ./packaging/linux/scripts/postinstall.sh
  postremove: ./packaging/linux/scripts/postremove.sh
